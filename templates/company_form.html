{% extends "base.html" %}
{% block title %}{{ 'Edit' if company else 'Add' }} Company – Job Tracker{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">{{ 'Edit Company' if company else 'Add Company' }}</h1>
        <p class="page-subtitle">{{ company.company_name if company else 'Enter company details below' }}</p>
    </div>
    <a href="{{ url_for('companies') }}" class="btn btn-outline">&#8592; Back</a>
</div>
<div class="form-card">
    <form method="POST" action="{{ url_for('edit_company', company_id=company.company_id) if company else url_for('add_company') }}">
        <div class="form-grid">
            <div class="form-group form-full">
                <label for="company_name">Company Name <span class="required">*</span></label>
                <input type="text" id="company_name" name="company_name"
                       value="{{ company.company_name if company else '' }}" required placeholder="e.g. Google">
            </div>
            <div class="form-group">
                <label for="industry">Industry</label>
                <input type="text" id="industry" name="industry"
                       value="{{ company.industry if company else '' }}" placeholder="e.g. Technology">
            </div>
            <div class="form-group">
                <label for="website">Website</label>
                <input type="text" id="website" name="website"
                       value="{{ company.website if company else '' }}" placeholder="e.g. www.company.com">
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city"
                       value="{{ company.city if company else '' }}" placeholder="e.g. Miami">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state"
                       value="{{ company.state if company else '' }}" placeholder="e.g. Florida">
            </div>
            <div class="form-group form-full">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3" placeholder="Any notes...">{{ company.notes if company else '' }}</textarea>
            </div>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('companies') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ 'Save Changes' if company else 'Add Company' }}</button>
        </div>
    </form>
</div>
{% endblock %}
