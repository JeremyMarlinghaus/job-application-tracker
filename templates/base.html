<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Application Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">&#128188; JobTracker</div>
    <ul class="nav-links">
        <li><a href="{{ url_for('dashboard') }}"    class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">Dashboard</a></li>
        <li><a href="{{ url_for('companies') }}"    class="{{ 'active' if 'compan' in request.endpoint else '' }}">Companies</a></li>
        <li><a href="{{ url_for('jobs') }}"         class="{{ 'active' if request.endpoint in ['jobs','add_job','edit_job'] else '' }}">Jobs</a></li>
        <li><a href="{{ url_for('applications') }}" class="{{ 'active' if 'application' in request.endpoint else '' }}">Applications</a></li>
        <li><a href="{{ url_for('contacts') }}"     class="{{ 'active' if 'contact' in request.endpoint else '' }}">Contacts</a></li>
        <li><a href="{{ url_for('job_match') }}"    class="{{ 'active' if request.endpoint == 'job_match' else '' }}">&#9733; Job Match</a></li>
    </ul>
</nav>

<main class="main-content">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="footer">
    Job Application Tracker &mdash; COP 4751 Course Project
</footer>

</body>
</html>
