{% extends "base.html" %}
{% block title %}{{ 'Edit' if contact else 'Add' }} Contact – Job Tracker{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">{{ 'Edit Contact' if contact else 'Add Contact' }}</h1>
        <p class="page-subtitle">{{ contact.contact_name if contact else 'Enter contact details below' }}</p>
    </div>
    <a href="{{ url_for('contacts') }}" class="btn btn-outline">&#8592; Back</a>
</div>
<div class="form-card">
    <form method="POST" action="{{ url_for('edit_contact', contact_id=contact.contact_id) if contact else url_for('add_contact') }}">
        <div class="form-grid">
            <div class="form-group form-full">
                <label for="contact_name">Full Name <span class="required">*</span></label>
                <input type="text" id="contact_name" name="contact_name"
                       value="{{ contact.contact_name if contact else '' }}" required placeholder="e.g. Jane Smith">
            </div>
            <div class="form-group">
                <label for="title">Job Title</label>
                <input type="text" id="title" name="title"
                       value="{{ contact.title if contact else '' }}" placeholder="e.g. Recruiter">
            </div>
            <div class="form-group">
                <label for="company_id">Company</label>
                <select id="company_id" name="company_id">
                    <option value="">Select a company</option>
                    {% for c in companies %}
                    <option value="{{ c.company_id }}"
                        {% if contact and contact.company_id == c.company_id %}selected{% endif %}>
                        {{ c.company_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ contact.email if contact else '' }}" placeholder="jane@company.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ contact.phone if contact else '' }}" placeholder="555-123-4567">
            </div>
            <div class="form-group form-full">
                <label for="linkedin_url">LinkedIn URL</label>
                <input type="text" id="linkedin_url" name="linkedin_url"
                       value="{{ contact.linkedin_url if contact else '' }}" placeholder="https://linkedin.com/in/username">
            </div>
            <div class="form-group form-full">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3" placeholder="How you met, what you discussed...">{{ contact.notes if contact else '' }}</textarea>
            </div>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('contacts') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ 'Save Changes' if contact else 'Add Contact' }}</button>
        </div>
    </form>
</div>
{% endblock %}
